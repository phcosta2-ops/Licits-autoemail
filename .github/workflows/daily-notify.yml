name: 🔔 LicitaControl — Notificação Diária
 
on:
  schedule:
    # Todo dia às 11:00 UTC = 08:00 horário de Brasília
    - cron: '0 11 * * *'
  workflow_dispatch:
 
jobs:
  notify:
    runs-on: ubuntu-latest
    name: Verificar e notificar vencimentos
 
    permissions:
      contents: write
 
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
 
      - name: 🔔 Executar notificações
        env:
          PIPEDRIVE_TOKEN:     ${{ secrets.PIPEDRIVE_TOKEN }}
          EMAILJS_SERVICE_ID:  ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY:  ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          TEAM_EMAILS:         ${{ secrets.TEAM_EMAILS }}
          MANAGER_EMAIL:       ${{ secrets.MANAGER_EMAIL }}
          COMPANY_NAME:        ${{ secrets.COMPANY_NAME }}
        run: node auto-notify.js
 
      - name: 💾 Salvar log de notificações
        run: |
          git config user.name  "LicitaControl Bot"
          git config user.email "bot@licitacontrol"
          git add notifications-log.json
          git diff --cached --quiet || git commit -m "log $(date -u '+%Y-%m-%d')"
          git push
